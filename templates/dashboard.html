<!DOCTYPE html>
<html>
<head>
    <title>Prediction Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <h1>Prediction History</h1>

        <table>
            <tr>
                <th>ID</th>
                <th>News</th>
                <th>Prediction</th>
                <th>Confidence</th>
                <th>Date</th>
            </tr>

            {% for record in records %}
            <tr>
                <td>{{ record[0] }}</td>
                <td>{{ record[1][:100] }}...</td>
                <td>{{ record[2] }}</td>
                <td>{{ record[3] }}%</td>
                <td>{{ record[4] }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="/">Back</a>
    </main>
</body>
</html>
